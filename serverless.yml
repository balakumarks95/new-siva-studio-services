# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: balavirtualworld
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: new-siva-studio-services
# "service" is the name of this project. This will also be added to your AWS resource names.
service: new-siva-studio-services

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 10
    exclude:
      - aws-sdk

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-south-1'}
  environment:
    STAGE: ${self:provider.stage}
    AWS_REGION: ${self:provider.region}
    SERVICE_NAME: ${self:service}
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com

package:
  individually: true

functions:
  hello:
    handler: src/handlers/hello.handler
    description: Example hello endpoint
    events:
      - httpApi:
          path: /
          method: get

  authSignUp:
    handler: src/handlers/auth/signUp.handler
    events:
      - httpApi:
          path: /auth/signup
          method: post
    environment:
      USER_POOL_ID:
        Ref: CognitoUserPool
      USER_POOL_CLIENT_ID:
        Ref: CognitoUserPoolClient

  authSignIn:
    handler: src/handlers/auth/signIn.handler
    events:
      - httpApi:
          path: /auth/signin
          method: post
    environment:
      USER_POOL_ID:
        Ref: CognitoUserPool
      USER_POOL_CLIENT_ID:
        Ref: CognitoUserPoolClient

  authRequestOtp:
    handler: src/handlers/auth/requestOtp.handler
    events:
      - httpApi:
          path: /auth/request-otp
          method: post
    environment:
      USER_POOL_ID:
        Ref: CognitoUserPool
      USER_POOL_CLIENT_ID:
        Ref: CognitoUserPoolClient

  authVerifyOtp:
    handler: src/handlers/auth/verifyOtp.handler
    events:
      - httpApi:
          path: /auth/verify-otp
          method: post
    environment:
      USER_POOL_ID:
        Ref: CognitoUserPool
      USER_POOL_CLIENT_ID:
        Ref: CognitoUserPoolClient

  authPreSignUp:
    handler: src/handlers/auth/triggers/preSignUp.handler

  authDefineChallenge:
    handler: src/handlers/auth/triggers/defineAuthChallenge.handler

  authCreateChallenge:
    handler: src/handlers/auth/triggers/createAuthChallenge.handler

  authVerifyChallenge:
    handler: src/handlers/auth/triggers/verifyAuthChallenge.handler

resources:
  Resources:
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${self:provider.stage}-user-pool
        AutoVerifiedAttributes:
          - email
          - phone_number
        AliasAttributes:
          - email
          - phone_number
        UsernameAttributes:
          - email
          - phone_number
        MfaConfiguration: OFF
        Schema:
          - Name: custom:role
            AttributeDataType: String
            Mutable: true
            Required: false
        LambdaConfig:
          PreSignUp:
            Fn::GetAtt:
              - AuthPreSignUpLambdaFunction
              - Arn
          DefineAuthChallenge:
            Fn::GetAtt:
              - AuthDefineChallengeLambdaFunction
              - Arn
          CreateAuthChallenge:
            Fn::GetAtt:
              - AuthCreateChallengeLambdaFunction
              - Arn
          VerifyAuthChallengeResponse:
            Fn::GetAtt:
              - AuthVerifyChallengeLambdaFunction
              - Arn
    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${self:provider.stage}-client
        UserPoolId:
          Ref: CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ADMIN_NO_SRP_AUTH
          - CUSTOM_AUTH_FLOW_ONLY
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_PASSWORD_AUTH
    AuthDefineChallengePermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - AuthDefineChallengeLambdaFunction
            - Arn
        Action: lambda:InvokeFunction
        Principal: cognito-idp.amazonaws.com
        SourceArn:
          Ref: CognitoUserPool
    AuthCreateChallengePermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - AuthCreateChallengeLambdaFunction
            - Arn
        Action: lambda:InvokeFunction
        Principal: cognito-idp.amazonaws.com
        SourceArn:
          Ref: CognitoUserPool
    AuthVerifyChallengePermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - AuthVerifyChallengeLambdaFunction
            - Arn
        Action: lambda:InvokeFunction
        Principal: cognito-idp.amazonaws.com
        SourceArn:
          Ref: CognitoUserPool
    AuthPreSignUpPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - AuthPreSignUpLambdaFunction
            - Arn
        Action: lambda:InvokeFunction
        Principal: cognito-idp.amazonaws.com
        SourceArn:
          Ref: CognitoUserPool
  Outputs:
    UserPoolId:
      Value:
        Ref: CognitoUserPool
    UserPoolClientId:
      Value:
        Ref: CognitoUserPoolClient
